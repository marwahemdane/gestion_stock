<div class="commandes-header">
  <h1>Tableau de commandes</h1>
  <button matButton><mat-icon>post_add</mat-icon> Nouvelle commande</button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>No.</th>
    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
  </ng-container>

  <!-- client Column -->
  <ng-container matColumnDef="client">
    <th mat-header-cell *matHeaderCellDef>Client</th>
    <td mat-cell *matCellDef="let element">{{ element.clientId }}</td>
  </ng-container>

  <!-- dateCommande Column -->
  <ng-container matColumnDef="dateCommande">
    <th mat-header-cell *matHeaderCellDef>Date de commande</th>
    <td mat-cell *matCellDef="let element">{{ element.dateCommande | date: 'M/d/yy' }}</td>
  </ng-container>

  <!-- dateLivraison Edit -->
  <ng-container matColumnDef="dateLivraison">
    <th mat-header-cell *matHeaderCellDef>Date de livraison</th>
    <td mat-cell *matCellDef="let element">{{ element.dateLivraison }}</td>
  </ng-container>

  <!-- dateLivraison articles -->
  <ng-container matColumnDef="articles">
    <th mat-header-cell *matHeaderCellDef>Articles</th>
    <td mat-cell *matCellDef="let element">articles --</td>
  </ng-container>

  <!-- totalQuantity Edit -->
  <ng-container matColumnDef="totalQuantity">
    <th mat-header-cell *matHeaderCellDef>Quantité total commandée</th>
    <td mat-cell *matCellDef="let element">{{ element.totalQuantity }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
